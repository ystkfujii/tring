version: 1

groups:
  - name: container-images-suffix
    description: Container image version update test with suffix (alpine)
    resolver: containerimage
    resolver_config:
      registry_url: "{{CONTAINERIMAGE_URL}}"
    sources:
      - type: dockerfile
        config:
          file_paths:
            - Dockerfile
    selectors:
      include:
        module_patterns:
          - "*"
    policy:
      selection:
        strategy: minor
