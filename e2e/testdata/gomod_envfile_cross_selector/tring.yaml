version: 1

groups:
  - name: combined-sources
    description: Cross-source update with selector narrowing and required align constraint
    resolver: goproxy
    resolver_config:
      proxy_url: "{{PROXY_URL}}"
    sources:
      - type: gomod
        config:
          manifest_paths:
            - go.mod
      - type: envfile
        config:
          file_paths:
            - versions.env
          variables:
            - name: KUBECTL_VERSION
              resolve_with: kubernetes/kubectl
            - name: HELM_VERSION
              resolve_with: helm/helm
    selectors:
      include:
        module_patterns:
          - github.com/prometheus/*
          - kubernetes/*
          - helm/*
    policy:
      selection:
        strategy: minor
      constraints:
        - type: align
          name: prometheus-align
          anchor: github.com/prometheus/client_golang
          members:
            - github.com/prometheus/client_golang
            - github.com/prometheus/common
          required: true
