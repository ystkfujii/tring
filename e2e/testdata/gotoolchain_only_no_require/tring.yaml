version: 1

groups:
  - name: go-only
    description: Test that include_require false doesn't update require deps
    resolver: gotoolchain
    resolver_config:
      base_url: "{{GOTOOLCHAIN_URL}}"
    sources:
      - type: gomod
        config:
          manifest_paths:
            - go.mod
          include_require: false
          track_go_version: true
          track_toolchain: false
    selectors:
      include:
        module_patterns:
          - "*"
    policy:
      selection:
        strategy: patch
