version: 1

groups:
  - name: test-group
    description: Test group for envfile source E2E testing
    resolver: goproxy
    resolver_config:
      proxy_url: "{{PROXY_URL}}"
    sources:
      - type: envfile
        config:
          file_paths:
            - versions.env
          variables:
            - name: KUBECTL_VERSION
              resolve_with: kubernetes/kubectl
            - name: HELM_VERSION
              resolve_with: helm/helm
    selectors:
      include:
        module_patterns:
          - "*"
    policy:
      selection:
        strategy: patch
