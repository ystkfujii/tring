version: 1

groups:
  - name: go-runtime
    description: Go runtime version update test
    resolver: gotoolchain
    resolver_config:
      base_url: "{{GOTOOLCHAIN_URL}}"
    sources:
      - type: gomod
        config:
          manifest_paths:
            - go.mod
          include_require: false
          track_go_version: true
          track_toolchain: true
    selectors:
      include:
        module_patterns:
          - "*"
    policy:
      selection:
        strategy: minor
