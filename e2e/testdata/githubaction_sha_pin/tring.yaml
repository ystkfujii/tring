version: 1

groups:
  - name: test-group
    description: Test group for GitHub Action SHA pin E2E testing
    resolver: githubrelease
    resolver_config:
      api_url: "{{API_URL}}"
    sources:
      - type: githubaction
        config:
          file_paths:
            - workflow.yaml
    selectors:
      include:
        module_patterns:
          - "*"
    policy:
      selection:
        strategy: patch
