version: 1

groups:
  - name: test-group
    description: Test group for E2E testing
    resolver: goproxy
    resolver_config:
      proxy_url: "{{PROXY_URL}}"
    sources:
      - type: gomod
        config:
          manifest_paths:
            - go.mod
    selectors:
      include:
        module_patterns:
          - "*"
    policy:
      selection:
        strategy: patch
