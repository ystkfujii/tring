version: 1

groups:
  - name: go-align
    description: Align Go version between go.mod and Dockerfile using gotoolchain resolver
    resolver: gotoolchain
    resolver_config:
      base_url: "{{GOTOOLCHAIN_URL}}"
    sources:
      - type: gomod
        config:
          manifest_paths:
            - go.mod
          include_require: false
          track_go_version: true
          track_toolchain: true
      - type: dockerfile
        config:
          file_paths:
            - Dockerfile
          image_mappings:
            - match: golang
              dependency_name: go
              version_scheme: semver
    selectors:
      include:
        module_patterns:
          - "*"
    policy:
      selection:
        strategy: minor
      constraints:
        - type: align
          anchor: go
          members:
            - go
